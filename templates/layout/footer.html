<footer style="background:var(--bg2);border-top:1px solid var(--border);padding:48px 24px 28px;">
  <div style="max-width:1280px;margin:0 auto;">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:40px;margin-bottom:40px;">
      <!-- Brand -->
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:16px;">🛍️</div>
          <span style="font-weight:800;font-size:18px;color:#fff;">ShopStyle</span>
        </div>
        <p style="font-size:13px;color:var(--muted);line-height:1.7;">Sifatli mahsulotlar, qulay narxlar va tez yetkazib berish xizmati.</p>
      </div>
      <!-- Links -->
      <div>
        <h4 style="font-size:14px;font-weight:700;color:#fff;margin-bottom:16px;">Havolalar</h4>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <a href="{% url 'index' %}" style="font-size:13px;color:var(--muted);text-decoration:none;">Bosh sahifa</a>
          <a href="#categories" style="font-size:13px;color:var(--muted);text-decoration:none;">Kategoriyalar</a>
          <a href="#products" style="font-size:13px;color:var(--muted);text-decoration:none;">Mahsulotlar</a>
        </div>
      </div>
      <!-- Contact -->
      <div>
        <h4 style="font-size:14px;font-weight:700;color:#fff;margin-bottom:16px;">Aloqa</h4>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <span style="font-size:13px;color:var(--muted);"><i class="fas fa-phone" style="color:var(--primary);margin-right:8px;"></i>+998 90 123 45 67</span>
          <span style="font-size:13px;color:var(--muted);"><i class="fas fa-envelope" style="color:var(--primary);margin-right:8px;"></i>info@shopstyle.uz</span>
          <span style="font-size:13px;color:var(--muted);"><i class="fas fa-map-marker-alt" style="color:var(--primary);margin-right:8px;"></i>Toshkent, O'zbekiston</span>
        </div>
      </div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:24px;text-align:center;">
      <p style="font-size:12px;color:var(--muted);">© 2025 ShopStyle. Barcha huquqlar himoyalangan.</p>
    </div>
  </div>
</footer>
