<nav id="main-nav" style="position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(15,15,26,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:all 0.3s;">
  <div style="max-width:1280px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:24px;">

    <!-- Logo -->
    <a href="{% url 'index' %}" style="text-decoration:none;display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:18px;">🛍️</div>
      <span style="font-weight:800;font-size:20px;color:#fff;letter-spacing:-0.5px;">ShopStyle</span>
    </a>

    <!-- Search (desktop) -->
    <div style="flex:1;max-width:400px;display:none;" id="search-bar" class="search-desktop">
      <div style="position:relative;">
        <input type="text" placeholder="Mahsulot qidiring..." style="width:100%;padding:10px 16px 10px 42px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;">
        <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;"></i>
      </div>
    </div>

    <!-- Right actions -->
    <div style="display:flex;align-items:center;gap:12px;">
      {% if user.is_authenticated %}
      <span style="color:var(--muted);font-size:14px;">Salom, <strong style="color:#fff;">{{ user.username }}</strong></span>
      <a href="{% url 'logout' %}" style="padding:8px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-weight:600;text-decoration:none;transition:all 0.2s;">Chiqish</a>
      {% else %}
      <a href="{% url 'login' %}" style="padding:8px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;text-decoration:none;">Kirish</a>
      <a href="{% url 'register' %}" style="padding:8px 18px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:8px;color:#fff;font-size:13px;font-weight:600;text-decoration:none;">Ro'yxat</a>
      {% endif %}

      <!-- Cart icon -->
      <a href="#" style="position:relative;width:42px;height:42px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text);text-decoration:none;">
        <i class="fas fa-shopping-bag" style="font-size:16px;"></i>
        <span class="cart-badge" style="position:absolute;top:-6px;right:-6px;background:var(--primary);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span>
      </a>
    </div>

  </div>
</nav>

<script>
// show search on desktop
if (window.innerWidth >= 640) {
  document.getElementById('search-bar').style.display = 'block';
}
</script>
